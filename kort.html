<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Elta Solar · Vores installationer i Danmark</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --ink:#091221; --panel:#101f37; --panel2:#0b1830;
    --sun:#f97316; --sun2:#fb923c; --leaf:#059669; --leaf2:#10b981; --cream:#eaf0f8;
    --line:rgba(255,255,255,.10); --sea:#0a1526; --land:#16304e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Trebuchet MS","Segoe UI",sans-serif;
    background:var(--ink); color:var(--cream); overflow:hidden;
  }
  .wrap{display:flex; height:100vh; width:100vw}
  aside{
    width:340px; flex:0 0 340px; height:100%;
    background:linear-gradient(180deg,var(--panel),var(--panel2));
    border-right:1px solid var(--line);
    display:flex; flex-direction:column; padding:26px 24px; gap:22px;
    box-shadow:18px 0 50px rgba(0,0,0,.4); z-index:500;
  }
  .brand{display:flex; align-items:center; gap:12px}
  .logo{
    width:46px; height:46px; border-radius:13px; flex:0 0 46px;
    background:linear-gradient(150deg,var(--leaf),#1f7e54);
    display:grid; place-items:center; box-shadow:0 0 22px rgba(5,150,105,.4);
  }
  .logo svg{width:26px;height:26px}
  .brand h1{font-size:1.05rem; letter-spacing:.3px; line-height:1.15}
  .brand span{color:var(--leaf2); font-size:.72rem; letter-spacing:2px; text-transform:uppercase}
  .stats{display:flex; gap:12px}
  .stat{
    flex:1; background:rgba(255,255,255,.04); border:1px solid var(--line);
    border-radius:14px; padding:14px 12px; text-align:center;
  }
  .stat b{display:block; font-size:1.9rem; color:var(--sun2); line-height:1; font-weight:800}
  .stat small{font-size:.66rem; text-transform:uppercase; letter-spacing:1.4px; opacity:.78}
  .search{position:relative}
  .search input{
    width:100%; padding:12px 14px 12px 38px; border-radius:11px;
    border:1px solid var(--line); background:rgba(0,0,0,.28); color:var(--cream);
    font-size:.9rem; outline:none;
  }
  .search input:focus{border-color:rgba(5,150,105,.5)}
  .search input::placeholder{color:rgba(234,240,248,.45)}
  .search svg{position:absolute; left:12px; top:11px; width:17px; height:17px; opacity:.6}
  .listhead{font-size:.7rem; text-transform:uppercase; letter-spacing:1.6px; opacity:.7}
  .list{flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:6px; padding-right:4px}
  .list::-webkit-scrollbar{width:7px}
  .list::-webkit-scrollbar-thumb{background:var(--line); border-radius:6px}
  .row{
    display:flex; align-items:center; gap:10px; padding:9px 11px; border-radius:10px;
    cursor:pointer; transition:.16s; border:1px solid transparent;
  }
  .row:hover{background:rgba(249,115,22,.10); border-color:var(--line)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--sun);flex:0 0 9px;box-shadow:0 0 8px var(--sun)}
  .row .nm{flex:1; font-size:.9rem}
  .row .nm small{display:block;opacity:.55;font-size:.72rem}
  .row .ct{font-weight:800; color:var(--sun2); font-size:.95rem}
  footer{font-size:.68rem; opacity:.5; line-height:1.5}
  main{flex:1; position:relative}
  #map{position:absolute; inset:0;
    background:
      radial-gradient(1100px 760px at 60% 42%, #15314e 0%, transparent 60%),
      radial-gradient(900px 700px at 62% 44%, rgba(5,150,105,.07), transparent 55%),
      radial-gradient(1400px 1000px at 50% 50%, #0d1a30 0%, var(--sea) 70%);
  }
  .leaflet-container{background:transparent; font:inherit}
  /* Denmark landmass styling */
  .dk-land{ filter:drop-shadow(0 0 22px rgba(5,150,105,.45)) drop-shadow(0 4px 16px rgba(0,0,0,.5)); }
  /* legend */
  .legend{
    position:absolute; right:16px; bottom:22px; z-index:600;
    background:rgba(11,24,48,.9); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; backdrop-filter:blur(8px); font-size:.74rem;
  }
  .legend b{color:var(--sun2); font-size:.72rem; letter-spacing:1.2px; text-transform:uppercase; display:block; margin-bottom:9px}
  .legend .lg{display:flex; align-items:center; gap:9px; margin:6px 0}
  .legend .pin{background:radial-gradient(circle at 35% 30%,var(--sun2),var(--sun));border-radius:50%;box-shadow:0 0 8px rgba(249,115,22,.6)}
  .legend .lgsun{filter:drop-shadow(0 0 5px rgba(249,115,22,.6)); flex:0 0 auto}
  /* Sol-markører */
  .sun{position:relative; display:grid; place-items:center;
    filter:drop-shadow(0 0 8px rgba(249,115,22,.7)); animation:rise .5s ease-out both}
  .sun svg{display:block; animation:spin 26s linear infinite}
  .sun.big svg{animation-duration:18s}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes rise{from{opacity:0;transform:translateY(-6px) scale(.4)}to{opacity:1;transform:none}}
  .sun .num{position:absolute; color:#fff; font-weight:800; font-family:sans-serif;
    text-shadow:0 1px 2px rgba(0,0,0,.55); line-height:1}
  .sun.big::after{content:"";position:absolute;width:100%;height:100%;border-radius:50%;
    border:2px solid var(--sun2);animation:halo 2.4s ease-out infinite;opacity:.7}
  @keyframes halo{0%{transform:scale(.7);opacity:.7}100%{transform:scale(2.3);opacity:0}}
  .leaflet-popup-content-wrapper{background:var(--panel); color:var(--cream); border-radius:13px; border:1px solid var(--line)}
  .leaflet-popup-tip{background:var(--panel)}
  .pop b{color:var(--sun2); font-size:1.02rem}
  .pop .big{font-size:1.7rem; font-weight:800; color:var(--sun2); line-height:1}
  .pop small{opacity:.7}
  .leaflet-bar a{background:var(--panel); color:var(--cream); border-color:var(--line)}
  .leaflet-bar a:hover{background:var(--panel2)}
  @media(max-width:760px){
    .wrap{flex-direction:column}
    aside{width:100%; flex:0 0 auto; height:auto; max-height:46vh; box-shadow:none; border-right:0; border-bottom:1px solid var(--line)}
    .list{max-height:20vh}
  }
</style>
</head>

const total = DATA.reduce((a,d)=>a+d[2],0);
document.getElementById('s-tot').textContent = total.toLocaleString('da-DK');
document.getElementById('s-by').textContent = DATA.length;

const map = L.map('map',{zoomControl:true, attributionControl:false, minZoom:6, maxZoom:12, zoomSnap:.25}).setView([56,11.4],7);

// Draw Denmark (no external tiles)
const land = L.geoJSON(GEO,{
  interactive:false,
  style:{ className:'dk-land', color:'#34d399', weight:1, opacity:.55,
          fillColor:'#16304e', fillOpacity:1 }
}).addTo(map);
const dkBounds = land.getBounds();
map.fitBounds(dkBounds,{padding:[40,40]});
map.setMaxBounds(dkBounds.pad(0.6));

function sunSize(c){ return c>=40?48:(c>=15?36:(c>=5?24:18)); }
function makeIcon(c){
  const s=sunSize(c), big = c>=15;
  const num = big ? '<span class="num" style="font-size:'+(s*0.34)+'px">'+c+'</span>' : '';
  const core = big ? 17 : 19;
  const html = '<div class="sun'+(c>=40?' big':'')+'" style="width:'+s+'px;height:'+s+'px;animation-delay:'+(Math.random()*0.5).toFixed(2)+'s">'
    + '<svg viewBox="0 0 64 64" width="'+s+'" height="'+s+'">'
    + '<g stroke="#fdba74" stroke-width="5" stroke-linecap="round">'
    + '<line x1="32" y1="3" x2="32" y2="12"/><line x1="32" y1="52" x2="32" y2="61"/>'
    + '<line x1="3" y1="32" x2="12" y2="32"/><line x1="52" y1="32" x2="61" y2="32"/>'
    + '<line x1="11" y1="11" x2="18" y2="18"/><line x1="46" y1="46" x2="53" y2="53"/>'
    + '<line x1="53" y1="11" x2="46" y2="18"/><line x1="18" y1="46" x2="11" y2="53"/></g>'
    + '<circle cx="32" cy="32" r="'+core+'" fill="#f97316" stroke="#ffe1bf" stroke-width="2.5"/>'
    + (big?'':'<circle cx="27" cy="27" r="5" fill="#ffd27a" opacity=".9"/>')
    + '</svg>'+num+'</div>';
  return L.divIcon({ className:'', iconSize:[s,s], iconAnchor:[s/2,s/2], popupAnchor:[0,-s/2], html:html });
}
const markers={}; 
DATA.forEach((d,i)=>{
  const by=d[0], post=d[1], c=d[2], lat=d[3], lng=d[4];
  const m=L.marker([lat,lng],{icon:makeIcon(c),zIndexOffset:c}).addTo(map);
  m.bindPopup('<div class="pop"><b>'+by+'</b> <small>'+post+'</small><br><span class="big">'+c+'</span> <small>solcelleanlæg</small></div>');
  markers[i]=m;
});

const listEl=document.getElementById('list');
function renderList(filter){
  const f=(filter||'').trim().toLowerCase();
  listEl.innerHTML='';
  DATA.map((d,i)=>[d,i])
    .filter(function(p){ const d=p[0]; return !f || d[0].toLowerCase().includes(f) || d[1].includes(f); })
    .forEach(function(p){
      const d=p[0], i=p[1], by=d[0], post=d[1], c=d[2];
      const row=document.createElement('div'); row.className='row';
      row.innerHTML='<span class="dot"></span><span class="nm">'+by+'<small>'+post+'</small></span><span class="ct">'+c+'</span>';
      row.onclick=function(){ const ll=markers[i].getLatLng(); map.flyTo(ll,10,{duration:.8}); markers[i].openPopup(); };
      listEl.appendChild(row);
    });
}
renderList();
document.getElementById('q').addEventListener('input',function(e){renderList(e.target.value);});
</script>
